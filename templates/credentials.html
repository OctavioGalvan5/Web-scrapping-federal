{% extends 'base.html' %}
{% block title %}Credenciales PJN{% endblock %}

{% block content %}
<h4 class="mb-4"><i class="bi bi-person-lock"></i> Credenciales PJN</h4>

<div class="row g-3">
  <div class="col-lg-8">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
        <span><i class="bi bi-key"></i> Usuarios guardados</span>
        <button class="btn btn-sm btn-success" onclick="abrirModal()">
          <i class="bi bi-plus-lg"></i> Nuevo
        </button>
      </div>
      <div class="card-body p-0">
        <table class="table table-hover mb-0" id="tabla">
          <thead class="table-light">
            <tr>
              <th>Nombre</th>
              <th>Usuario PJN</th>
              <th class="text-end">Acciones</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="3" class="text-center text-muted py-4">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="modalCred" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitulo">Nueva credencial</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <div class="mb-3">
          <label class="form-label fw-bold">Nombre descriptivo</label>
          <input type="text" id="inNombre" class="form-control" placeholder="Ej: Estudio Galván">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Usuario PJN</label>
          <input type="text" id="inUsuario" class="form-control" placeholder="usuario@pjn.gov.ar">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Contraseña</label>
          <div class="input-group">
            <input type="password" id="inPassword" class="form-control" placeholder="••••••••">
            <button class="btn btn-outline-secondary" type="button" onclick="togglePass()">
              <i class="bi bi-eye" id="icoPass"></i>
            </button>
          </div>
        </div>
        <div id="modalError" class="alert alert-danger d-none small"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" onclick="guardar()">
          <i class="bi bi-save"></i> Guardar
        </button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const modal = new bootstrap.Modal(document.getElementById('modalCred'));

async function cargarLista() {
  const resp = await fetch('/credentials/api/list');
  const data = await resp.json();
  const tbody = document.getElementById('tbody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted py-4">No hay credenciales guardadas</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(c => `
    <tr>
      <td class="fw-bold">${c.nombre}</td>
      <td><code>${c.usuario}</code></td>
      <td class="text-end">
        <button class="btn btn-sm btn-outline-primary me-1" onclick="editar(${c.id}, '${c.nombre}', '${c.usuario}')">
          <i class="bi bi-pencil"></i>
        </button>
        <button class="btn btn-sm btn-outline-danger" onclick="eliminar(${c.id}, '${c.nombre}')">
          <i class="bi bi-trash"></i>
        </button>
      </td>
    </tr>
  `).join('');
}

function abrirModal(id='', nombre='', usuario='') {
  document.getElementById('editId').value = id;
  document.getElementById('inNombre').value = nombre;
  document.getElementById('inUsuario').value = usuario;
  document.getElementById('inPassword').value = '';
  document.getElementById('modalError').classList.add('d-none');
  document.getElementById('modalTitulo').textContent = id ? 'Editar credencial' : 'Nueva credencial';
  modal.show();
}

function editar(id, nombre, usuario) {
  abrirModal(id, nombre, usuario);
}

async function guardar() {
  const id       = document.getElementById('editId').value;
  const nombre   = document.getElementById('inNombre').value.trim();
  const usuario  = document.getElementById('inUsuario').value.trim();
  const password = document.getElementById('inPassword').value.trim();
  const errDiv   = document.getElementById('modalError');

  if (!nombre || !usuario || !password) {
    errDiv.textContent = 'Todos los campos son obligatorios';
    errDiv.classList.remove('d-none');
    return;
  }

  const resp = await fetch('/credentials/api/guardar', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: id || null, nombre, usuario, password })
  });
  const data = await resp.json();
  if (data.error) {
    errDiv.textContent = data.error;
    errDiv.classList.remove('d-none');
    return;
  }
  modal.hide();
  cargarLista();
}

async function eliminar(id, nombre) {
  if (!confirm(`¿Eliminar "${nombre}"?`)) return;
  await fetch(`/credentials/api/${id}`, { method: 'DELETE' });
  cargarLista();
}

function togglePass() {
  const inp = document.getElementById('inPassword');
  const ico = document.getElementById('icoPass');
  if (inp.type === 'password') {
    inp.type = 'text';
    ico.className = 'bi bi-eye-slash';
  } else {
    inp.type = 'password';
    ico.className = 'bi bi-eye';
  }
}

cargarLista();
</script>
{% endblock %}
